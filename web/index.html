<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventory Dashboard PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="/web/css/styles.css">
</head>

<body>

<script>
if (window.Telegram?.WebApp) {
    Telegram.WebApp.expand();
}
</script>

<!-- HEADER -->
<div class="header">
    <h2>📊 Инвентаризация</h2>
</div>

<!-- KPI -->
<div class="kpi">
    <div class="kpi-card">Всего<br><span id="kpiTotal">0</span></div>
    <div class="kpi-card green">Закрыто<br><span id="kpiClosed">0</span></div>
    <div class="kpi-card yellow">В работе<br><span id="kpiProgress">0</span></div>
    <div class="kpi-card red">Просрочено<br><span id="kpiOverdue">0</span></div>
</div>

<!-- FILTERS -->
<div class="filters">
    <div class="filter-block">
        <label>Подразделение</label>
        <select id="filterType"></select>
    </div>

    <div class="filter-block">
        <label>Бухгалтер</label>
        <select id="filterAccountant"></select>
    </div>

    <div class="filter-block">
        <label>ТМ</label>
        <select id="filterTM"></select>
    </div>

    <div class="filter-block">
        <label>Статус</label>
        <select id="filterStatus"></select>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h3>🔥 Проблемы</h3>
        <div id="problems"></div>

        <h3>📋 Все филиалы</h3>
        <div id="list"></div>

    </div>

    <!-- CONTENT -->
    <div class="content">
        <div id="tableView" class="table-view">
            <div class="empty-state">
                Выбери филиал →
            </div>
        </div>
    </div>

</div>

<!-- 🔥 МОДАЛЬНОЕ ОКНО (НОВОЕ ОКНО ДЛЯ EXCEL) -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div id="modalBody"></div>
    </div>
</div>

<script src="/web/js/app.js"></script>

</body>
</html>
