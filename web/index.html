<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard PRO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { font-family: Arial; padding: 10px; background:#f5f5f5; }

h2 { margin-bottom: 5px; }

.kpi {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.kpi-card {
    flex:1;
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.card {
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
}

.green { color:green; }
.red { color:red; }
.yellow { color:orange; }
</style>

</head>
<body>

<h2>📊 Инвентаризация</h2>

<div class="kpi">
    <div class="kpi-card">Всего<br><span id="kpiTotal">0</span></div>
    <div class="kpi-card green">Закрыто<br><span id="kpiClosed">0</span></div>
    <div class="kpi-card yellow">В работе<br><span id="kpiProgress">0</span></div>
    <div class="kpi-card red">Просрочено<br><span id="kpiOverdue">0</span></div>
</div>

<select id="filterAccountant"></select>
<select id="filterTM"></select>
<select id="filterStatus"></select>

<h3>🔥 Проблемы</h3>
<div id="problems"></div>

<h3>📋 Все филиалы</h3>
<div id="list"></div>

<script>

let DATA = [];
let SUMMARY = {};

async function load() {

    const res = await fetch("/dashboard");
    const json = await res.json();

    DATA = json.items || [];
    SUMMARY = json.summary || {};

    fillKPI();
    fillFilters();
    renderProblems();
    render(DATA);
}

function fillKPI() {

    document.getElementById("kpiTotal").innerText = SUMMARY.total || 0;
    document.getElementById("kpiClosed").innerText = SUMMARY.closed || 0;
    document.getElementById("kpiProgress").innerText = SUMMARY.in_progress || 0;
    document.getElementById("kpiOverdue").innerText = SUMMARY.overdue || 0;
}

function fillFilters() {

    const accSet = new Set();
    const tmSet = new Set();
    const statusSet = new Set();

    DATA.forEach(x => {
        accSet.add(x.accountant);
        tmSet.add(x.tm);
        statusSet.add(x.status);
    });

    fillSelect("filterAccountant", accSet);
    fillSelect("filterTM", tmSet);
    fillSelect("filterStatus", statusSet);
}

function fillSelect(id, set) {

    const el = document.getElementById(id);

    el.innerHTML = "<option value=''>Все</option>";

    set.forEach(v => {
        if (v)
            el.innerHTML += `<option>${v}</option>`;
    });

    el.onchange = applyFilters;
}

function applyFilters() {

    const acc = document.getElementById("filterAccountant").value;
    const tm = document.getElementById("filterTM").value;
    const status = document.getElementById("filterStatus").value;

    const filtered = DATA.filter(x => {

        return (!acc || x.accountant === acc)
            && (!tm || x.tm === tm)
            && (!status || x.status === status);
    });

    render(filtered);
}

function getColor(x) {

    if (x.is_overdue) return "red";
    if (x.is_closed) return "green";
    return "yellow";
}

function sortData(arr) {

    return arr.sort((a, b) => {

        if (a.is_overdue !== b.is_overdue)
            return b.is_overdue - a.is_overdue;

        if (a.is_closed !== b.is_closed)
            return a.is_closed - b.is_closed;

        return (a.days || 0) - (b.days || 0);
    });
}

function renderProblems() {

    const overdue = DATA.filter(x => x.is_overdue);

    let html = "";

    overdue.forEach(x => {
        html += `<div class="card red">${x.branch} — ПРОСРОЧЕНО</div>`;
    });

    document.getElementById("problems").innerHTML = html || "Нет проблем 🎉";
}

function render(data) {

    let html = "";

    const sorted = sortData(data);

    sorted.forEach(x => {

        const color = getColor(x);

        html += `
        <div class="card" onclick="openDetail('${x.branch}')">
            <b>${x.branch}</b><br>
            <span class="${color}">${x.status_raw}</span><br>
            ${x.accountant} / ${x.tm}
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

function openDetail(name) {

    const x = DATA.find(i => i.branch === name);

    alert(
`${x.branch}

Итого: ${x.total}
Статус: ${x.status_raw}
Дней: ${x.days}

Бухгалтер: ${x.accountant}
ТМ: ${x.tm}`
    );
}

load();

</script>

</body>
</html>
